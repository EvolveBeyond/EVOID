<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EVOID — Intent-Oriented Programming Runtime</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="Reference Runtime for Intent-Oriented Programming">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <!-- Tabs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/styles.min.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #6366f1;
      --theme-color_rgb: 99, 102, 241;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #6366f1;
      --sidebar-nav-link-border-color--active: #6366f1;
      --link-color: #6366f1;
      --cover-background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --cover-heading-color: #fff;
      --cover-color: #fff;
      --cover-link-color: #fff;
      --cover-button-primary-color: #fff;
      --cover-button-primary-background: rgba(255,255,255,0.2);
      --cover-blockquote-color: rgba(255,255,255,0.8);
      --code-background-color: #f8f9fa;
      --code-border-color: #e9ecef;
      --tip-color: #6366f1;
      --warning-color: #f59e0b;
      --danger-color: #ef4444;
    }
    /* Smooth transitions */
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      scroll-margin-top: 20px;
    }
    /* Better code blocks */
    .markdown-section code {
      border-radius: 4px;
      padding: 2px 6px;
    }
    .markdown-section pre > code {
      padding: 16px;
      border-radius: 8px;
    }
    /* Tip/Warning/Danger blocks */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      padding: 12px 16px;
      margin: 16px 0;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 0 8px 8px 0;
    }
    .markdown-section blockquote p {
      margin: 0;
    }
    /* Badge styling */
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: #10b981; color: white; }
    .badge-warning { background: #f59e0b; color: white; }
    .badge-danger { background: #ef4444; color: white; }
    .badge-info { background: #6366f1; color: white; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'EVOID',
      repo: 'https://github.com/EVOID/EVOID',
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3
      },
      auto2top: true,
      execution: {
        enable: true,
        timeout: 5000
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      tabs: {
        persist: true,
        sync: true,
      },
      // Emoji support
      emoji: {
        toc: true
      },
      // Navigation tabs
      nav: [
        { title: 'Guide', path: '/guide/' },
        { title: 'Tutorial', path: '/tutorial/' },
        { title: 'API', path: '/api/' },
        { title: 'Examples', path: '/examples/' },
      ],
      // Pagination
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
      // Back to top
      'back-to-top': {
        offset: 300,
        text: 'Back to top',
        show: true,
      },
      // Smooth scroll
      smoothScroll: true,
      // External links open in new tab
      externalLink: {
        target: '_blank',
        rel: 'noopener'
      },
    }
  </script>
  <!-- Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-back-to-top"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-emoji"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
</body>
</html>
